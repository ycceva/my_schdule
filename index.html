<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 스케줄 대시보드</title>

<!-- PWA / 홈 화면 앱 설정 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="내대시보드">
<meta name="theme-color" content="#141414">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    font-size: 15px;
    background: #141414;
    color: #e2e2e2;
    padding: 14px;
    line-height: 1.4;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: -14px -14px 12px -14px;
    padding: 13px 16px;
    background: linear-gradient(135deg, #181826 0%, #20203a 50%, #262644 100%);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; right: -10%;
    width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(122,110,255,0.25), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; z-index: 1; min-width: 0; }
  .header-badge {
    display: inline-block; align-self: flex-start;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: #a9b6ff;
    background: rgba(122,110,255,0.10);
    border: 1px solid rgba(138,150,255,0.45);
    border-radius: 20px; padding: 2px 9px;
  }
  .header h1 {
    display: flex; align-items: center; gap: 6px;
    font-size: 20px; font-weight: 700; color: #f3f3fa;
    letter-spacing: 0.2px;
  }
  .header-heart { font-size: 18px; line-height: 1; }
  #text_title { outline: none; word-break: break-word; }
  #text_title.placeholder::before { content: '내 스케줄 대시보드'; color: rgba(243,243,250,0.4); }
  #text_title:focus { text-decoration: underline dotted rgba(243,243,250,0.35); }
  .header-date {
    font-size: 12px; color: #8a8ab0;
    letter-spacing: 0.4px;
  }
  .save-status { font-size: 12px; color: #6e6e8c; transition: color 0.3s; z-index: 1; flex-shrink: 0; }
  .save-status.saving { color: #c7c7e6; }
  .save-status.saved  { color: #6fdc7a; }
  .save-status.error  { color: #ff8a8a; }

  /* ── Section ── */
  .section { margin-bottom: 12px; }
  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: #777;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 5px;
    outline: none;
    word-break: break-word;
  }
  .section-title.placeholder::before { content: '제목'; color: #3a3a3a; text-transform: none; }
  .section-title:focus { background: rgba(58,90,122,0.06); }
  .section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .section-title-row .section-title { margin-bottom: 0; }

  .add-btn {
    font-size: 12px; font-family: inherit;
    background: none; border: 0.5px solid #333;
    border-radius: 4px; color: #777;
    padding: 2px 8px; cursor: pointer;
  }
  .add-btn:hover { border-color: #555; color: #aaa; }

  /* ── 진행률 ── */
  .progress-section { display: flex; flex-direction: column; gap: 5px; }
  .progress-cat-row { display: flex; align-items: center; gap: 6px; }
  .progress-cat-label {
    width: 40px; flex-shrink: 0;
    font-size: 13px; font-weight: 600; color: #ccc;
    outline: none; word-break: break-word;
  }
  .progress-cat-label.placeholder::before { content: '제목'; color: #3a3a3a; }
  .progress-cat-label:focus { background: rgba(58,90,122,0.06); }
  .progress-cards {
    flex: 1; display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }
  .progress-card {
    background: #1c1c1c; border: 0.5px solid #2a2a2a;
    border-radius: 5px; padding: 3px 6px;
  }
  .progress-card-top {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 3px;
  }
  .progress-card-label { font-size: 10px; color: #777; letter-spacing: 0.3px; }
  .progress-card-pct { font-size: 13px; font-weight: 600; color: #ddd; }
  .progress-bar-bg {
    height: 4px; background: #2e2e2e;
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: #4a8ac4; border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── 빠른 입력 (오늘할거/이번주할거/일년목표/루틴) ── */
  .quick-box {
    background: #1a1a1a;
    border: 0.5px solid #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
  }
  .quick-row {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 10px;
    border-bottom: 0.5px solid #242424;
  }
  .quick-row:last-child { border-bottom: none; }
  .quick-label {
    flex-shrink: 0; width: 86px; font-size: 13px;
    font-weight: 500; color: #888; padding-top: 1px;
    outline: none; white-space: pre-wrap; word-break: break-word;
  }
  .quick-label.placeholder::before { content: '제목'; color: #3a3a3a; }
  .quick-label:focus { background: rgba(58,90,122,0.06); }
  .quick-text {
    flex: 1; font-size: 14px; color: #ddd;
    min-height: 18px; outline: none;
    white-space: pre-wrap; word-break: break-word;
  }
  .quick-text.placeholder::before { content: '입력...'; color: #3a3a3a; }
  .quick-text:focus { background: rgba(58,90,122,0.06); }

  /* ── 루틴 체크리스트 ── */
  .routine-list {
    background: #1a1a1a;
    border: 0.5px solid #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
  }
  .routine-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    border-bottom: 0.5px solid #242424;
  }
  .routine-item:last-child { border-bottom: none; }
  .routine-checkbox {
    width: 16px; height: 16px; flex-shrink: 0;
    accent-color: #4a8ac4; cursor: pointer;
  }
  .routine-text {
    flex: 1; font-size: 14px; color: #ddd; outline: none;
    white-space: pre-wrap; word-break: break-word; min-height: 16px;
  }
  .routine-text.placeholder::before { content: '항목 입력...'; color: #3a3a3a; }
  .routine-text:focus { background: rgba(58,90,122,0.06); }
  .routine-del {
    background: none; border: none; cursor: pointer;
    color: #3a3a3a; font-size: 15px; padding: 2px 4px; flex-shrink: 0;
  }
  .routine-del:hover { color: #d95a5a; }
  .routine-move-wrap {
    display: flex; flex-direction: column; gap: 1px;
    flex-shrink: 0; justify-content: center;
  }
  .routine-move {
    background: none; border: none; cursor: pointer;
    color: #4a4a4a; font-size: 11px; padding: 1px 3px;
    line-height: 1; font-family: inherit;
  }
  .routine-move:hover { color: #aaa; }
  .routine-move:disabled { opacity: 0.2; cursor: default; }
  .routine-link {
    color: #4a8ac4; text-decoration: underline;
    word-break: break-all;
  }
  .add-item-row { padding: 5px 10px; }
  .add-item-btn {
    font-size: 12px; color: #666; background: none;
    border: 0.5px dashed #333; border-radius: 4px;
    padding: 3px 10px; cursor: pointer; font-family: inherit;
  }
  .add-item-btn:hover { color: #aaa; border-color: #555; }

  /* ── 바로가기(하위페이지) ── */
  .page-list { display: flex; flex-direction: column; gap: 5px; }
  .page-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: #1a1a1a;
    border: 0.5px solid #2a2a2a; border-radius: 6px;
    font-size: 14px; color: #ddd; cursor: pointer;
  }
  .page-list-item:active { background: #232323; }
  .page-arrow { color: #555; font-size: 15px; }

  /* ── 바로가기: 텍스트형 항목 (제목+내용 직접입력) ── */
  .shortcut-text-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 12px; background: #1a1a1a;
    border: 0.5px solid #2a2a2a; border-radius: 6px;
  }
  .shortcut-text-title {
    flex-shrink: 0; width: 78px; font-size: 13px;
    font-weight: 500; color: #888; padding-top: 1px;
    outline: none; white-space: pre-wrap; word-break: break-word;
  }
  .shortcut-text-title.placeholder::before { content: '제목'; color: #3a3a3a; }
  .shortcut-text-content {
    flex: 1; font-size: 14px; color: #ddd; outline: none;
    white-space: pre-wrap; word-break: break-word; min-height: 18px;
  }
  .shortcut-text-content.placeholder::before { content: '내용 입력...'; color: #3a3a3a; }
  .shortcut-text-title:focus, .shortcut-text-content:focus { background: rgba(58,90,122,0.06); }
  .shortcut-del {
    background: none; border: none; cursor: pointer;
    color: #3a3a3a; font-size: 15px; padding: 2px 4px; flex-shrink: 0;
  }
  .shortcut-del:hover { color: #d95a5a; }
  .shortcut-controls {
    display: flex; flex-direction: column; gap: 1px;
    flex-shrink: 0; justify-content: center;
  }
  .shortcut-move {
    background: none; border: none; cursor: pointer;
    color: #4a4a4a; font-size: 11px; padding: 1px 3px;
    line-height: 1; font-family: inherit;
  }
  .shortcut-move:hover { color: #aaa; }
  .shortcut-move:disabled { opacity: 0.2; cursor: default; }

  /* ── 페이지 상세 뷰 ── */
  .page-view {
    display: none;
    position: fixed; inset: 0;
    background: #141414; z-index: 500;
    padding: 14px; overflow-y: auto;
  }
  .page-view.on { display: block; }
  .page-view-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .pv-btn {
    background: none; border: 0.5px solid #333; border-radius: 4px;
    color: #999; font-size: 13px; padding: 5px 10px;
    cursor: pointer; font-family: inherit; flex-shrink: 0;
  }
  .pv-btn:hover { border-color: #555; color: #ccc; }
  .pv-btn.del:hover { color: #d95a5a; border-color: #d95a5a; }
  .page-view-title {
    flex: 1; font-size: 16px; font-weight: 500; color: #eee;
    outline: none; padding: 5px 6px; border-radius: 4px;
    white-space: pre-wrap; word-break: break-word;
  }
  .page-view-title:focus { background: rgba(58,90,122,0.08); }

  .page-content {
    min-height: 200px; font-size: 15px; color: #ccc;
    line-height: 1.7; outline: none; white-space: pre-wrap;
    word-break: break-word; padding: 4px 2px;
  }
  .page-content:empty::before {
    content: '텍스트나 이미지를 붙여넣으세요 (Cmd/Ctrl+V)';
    color: #3a3a3a;
  }
  .page-content img {
    max-width: 100%; border-radius: 6px;
    margin: 6px 0; display: block; cursor: pointer;
  }
  .img-selected { outline: 2px solid #4a8ac4; outline-offset: 1px; }
  /* 데스크탑: 이미지 위에 떠있는 툴바 */
  .img-toolbar {
    position: fixed; z-index: 9999;
    background: #222; border: 1px solid #333; border-radius: 6px;
    display: flex; align-items: center; gap: 2px; padding: 3px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  }
  .img-toolbar button {
    background: transparent; border: none; color: #aaa;
    font-size: 13px; padding: 3px 8px; border-radius: 4px;
    cursor: pointer; white-space: nowrap; font-family: inherit;
  }
  .img-toolbar button:hover { background: #333; color: #fff; }
  .img-toolbar button.del { color: #f87171; }
  .img-toolbar button.del:hover { background: rgba(248,113,113,0.15); }
  /* 모바일: 화면 하단 고정 바 */
  @media (pointer: coarse) {
    .img-toolbar {
      position: fixed; bottom: 0; left: 0; right: 0; top: auto !important;
      border-radius: 12px 12px 0 0;
      justify-content: center; gap: 8px; padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    .img-toolbar button { font-size: 16px; padding: 6px 14px; }
    .img-resize-handle { display: none !important; }
    .img-size-btn { display: inline-flex !important; }
  }
  .img-resize-handle {
    position: fixed; z-index: 10000;
    width: 18px; height: 18px;
    background: #3a7ac4; border: 2px solid #fff;
    border-radius: 3px; cursor: nwse-resize;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    touch-action: none;
  }
  .img-size-btn { display: none; }

  /* ── 라이트박스 ── */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 9999;
    align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.on { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 4px; object-fit: contain; }

  @media (max-width: 640px) {
    body { padding: 10px; }
    .quick-label { width: 64px; font-size: 12px; }
    .shortcut-text-title { width: 64px; font-size: 12px; }
    .header { margin: -10px -10px 12px -10px; }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="header-badge">SCHEDULE TRACKER</span>
      <h1><span class="header-heart">❤️</span><span id="text_title" contenteditable="true" spellcheck="false"></span></h1>
      <span class="header-date" id="headerDate"></span>
    </div>
    <span class="save-status" id="saveStatus">● 로딩 중...</span>
  </div>

  <!-- 26년 성장 진행률 -->
  <div class="section">
    <div class="section-title" id="text_title_progress" contenteditable="true" spellcheck="false"></div>
    <div class="progress-section" id="progressSection"></div>
  </div>

  <!-- 오늘할거 / 이번주할거 / 일년목표 / 루틴 -->
  <div class="section">
    <div class="quick-box">
      <div class="quick-row">
        <div class="quick-label" id="text_label_today" contenteditable="true" spellcheck="false"></div>
        <div class="quick-text" id="text_today" contenteditable="true" spellcheck="false"></div>
      </div>
      <div class="quick-row">
        <div class="quick-label" id="text_label_week" contenteditable="true" spellcheck="false"></div>
        <div class="quick-text" id="text_week" contenteditable="true" spellcheck="false"></div>
      </div>
      <div class="quick-row">
        <div class="quick-label" id="text_label_year" contenteditable="true" spellcheck="false"></div>
        <div class="quick-text" id="text_year" contenteditable="true" spellcheck="false"></div>
      </div>
      <div class="quick-row">
        <div class="quick-label" id="text_label_routine" contenteditable="true" spellcheck="false"></div>
        <div class="quick-text" id="text_routine" contenteditable="true" spellcheck="false"></div>
      </div>
    </div>
  </div>

  <!-- 운동루틴 -->
  <div class="section">
    <div class="section-title-row">
      <div class="section-title" id="text_title_exercise" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="routine-list" id="list_exercise"></div>
  </div>

  <!-- 공부루틴 -->
  <div class="section">
    <div class="section-title-row">
      <div class="section-title" id="text_title_study" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="routine-list" id="list_study"></div>
  </div>

  <!-- 돈벌자루틴 -->
  <div class="section">
    <div class="section-title-row">
      <div class="section-title" id="text_title_money" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="routine-list" id="list_money"></div>
  </div>

  <!-- 바로가기 (하위페이지) -->
  <div class="section">
    <div class="section-title-row">
      <div class="section-title" id="text_title_shortcuts" contenteditable="true" spellcheck="false"></div>
      <div style="display:flex; gap:6px;">
        <button class="add-btn" onclick="addTextShortcut()">＋ 텍스트추가</button>
        <button class="add-btn" onclick="addPage()">＋ 페이지추가</button>
      </div>
    </div>
    <div class="page-list" id="pageList"></div>
  </div>

  <!-- 데이터 백업 -->
  <div class="section">
    <div class="section-title" id="text_title_backup" contenteditable="true" spellcheck="false"></div>
    <div style="display:flex; gap:6px;">
      <button class="add-btn" onclick="backupData()">⬇ 백업 다운로드</button>
      <button class="add-btn" onclick="document.getElementById('restoreFile').click()">⬆ 백업 불러오기</button>
      <input type="file" id="restoreFile" accept="application/json" style="display:none" onchange="restoreData(event)">
    </div>
  </div>

  <!-- 페이지 상세 뷰 -->
  <div class="page-view" id="pageView">
    <div class="page-view-header">
      <button class="pv-btn" onclick="closePage()">← 뒤로</button>
      <div class="page-view-title" id="pageViewTitle" contenteditable="true" spellcheck="false"></div>
      <button class="pv-btn del" onclick="deleteCurrentPage()">삭제</button>
    </div>
    <div class="page-content" id="pageContent" contenteditable="true" spellcheck="false"></div>
  </div>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('on')">
    <img id="lightboxImg" src="">
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ════════════════════════════════════════════════════════
    //  Supabase 초기화 — 본인 프로젝트의 URL / anon key로 교체하세요
    //  설정 전에도 이 기기의 localStorage에 모든 내용이 저장되어
    //  체크박스/텍스트/페이지를 바로 사용할 수 있습니다.
    // ════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://ntouwtrgighdfxzfqssr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50b3V3dHJnaWdoZGZ4emZxc3NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzOTc0NDgsImV4cCI6MjA5Njk3MzQ0OH0.bjg56Ae852qUhpD0vg0nF1OX2UVakFTJtiz-qbaHCk4';
    const SUPA_READY = /^https?:\/\//.test(SUPABASE_URL) && SUPABASE_KEY !== 'YOUR_SUPABASE_ANON_KEY';
    let db = null;
    if (SUPA_READY) {
      try {
        const { createClient } = supabase;
        db = createClient(SUPABASE_URL, SUPABASE_KEY);
      } catch (e) { console.error('Supabase 초기화 실패:', e); }
    }

    function setStatus(state) {
      const el = document.getElementById('saveStatus');
      if (state === 'saving') { el.textContent = '● 저장 중...'; el.className = 'save-status saving'; }
      if (state === 'saved')  { el.textContent = '● 저장됨';    el.className = 'save-status saved'; }
      if (state === 'error')  { el.textContent = '● 저장 실패 (Supabase 확인)'; el.className = 'save-status error'; }
      if (state === 'local')  { el.textContent = '● 이 기기에 저장됨 (Supabase 미설정)'; el.className = 'save-status saving'; }
    }

    // ── localStorage 헬퍼 (Supabase 미설정 시 / 오프라인 캐시) ──
    const LS_PREFIX = 'mydash_';
    function lsGet(key, fallback) {
      try {
        const v = localStorage.getItem(LS_PREFIX + key);
        return v !== null ? JSON.parse(v) : fallback;
      } catch (e) { return fallback; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(val)); } catch (e) {}
    }
    function uid() { return 'l' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function isRemoteId(id) { return typeof id === 'number'; }

    // ── 날짜 헬퍼 ──
    function todayStr() {
      const d = new Date();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}-${m}-${day}`;
    }
    function dayOfYear(d) {
      const start = new Date(d.getFullYear(), 0, 1);
      return Math.floor((d - start) / 86400000) + 1;
    }

    // ════════════════════════════════════════════════════════
    //  26년 성장 진행률
    // ════════════════════════════════════════════════════════
    const CATS = [
      { key: 'exercise', label: '운동' },
      { key: 'study',    label: '공부' },
      { key: 'money',    label: '돈벌자' },
    ];
    const PERIODS = [
      { key: 'today', label: '오늘' },
      { key: 'month', label: '이번달' },
      { key: 'year',  label: '연간' },
    ];
    const CAT_LABEL_KEYS = CATS.map(cat => 'catlabel_' + cat.key);

    // 기본 시드 (Supabase 미설정 / localStorage 비어있을 때)
    function defaultRoutines() {
      const mk = (category, n) => Array.from({ length: n }, (_, i) => ({ id: uid(), category, label: '', sort_order: i }));
      return [...mk('exercise', 5), ...mk('study', 4), ...mk('money', 3)];
    }

    let routines = lsGet('routines', null) || defaultRoutines();       // {id, category, label, sort_order}
    let routineChecks = lsGet('checks', []);                            // {routine_id, check_date}

    function calcProgress(category) {
      const items = routines.filter(r => r.category === category);
      const N = items.length;
      if (N === 0) return { today: 0, month: 0, year: 0 };
      const ids = new Set(items.map(r => r.id));
      const now = new Date();
      const ts = todayStr();
      const monthPrefix = ts.slice(0, 7);
      const yearPrefix = ts.slice(0, 4);
      let todayCnt = 0, monthCnt = 0, yearCnt = 0;
      routineChecks.forEach(c => {
        if (!ids.has(c.routine_id)) return;
        if (c.check_date === ts) todayCnt++;
        if (c.check_date.slice(0, 7) === monthPrefix) monthCnt++;
        if (c.check_date.slice(0, 4) === yearPrefix) yearCnt++;
      });
      const daysInMonth = now.getDate();
      const doy = dayOfYear(now);
      return {
        today: (todayCnt / N) * 100,
        month: Math.min(100, (monthCnt / (N * daysInMonth)) * 100),
        year:  Math.min(100, (yearCnt  / (N * doy)) * 100),
      };
    }

    function renderProgress() {
      const wrap = document.getElementById('progressSection');
      wrap.innerHTML = '';
      CATS.forEach(cat => {
        const pct = calcProgress(cat.key);
        const row = document.createElement('div');
        row.className = 'progress-cat-row';

        const label = document.createElement('div');
        label.className = 'progress-cat-label';
        label.contentEditable = 'true';
        label.spellcheck = false;
        const labelKey = 'catlabel_' + cat.key;
        const labelVal = texts[labelKey] !== undefined ? texts[labelKey] : cat.label;
        label.textContent = labelVal;
        label.classList.toggle('placeholder', !labelVal.trim());
        label.addEventListener('focus', () => label.classList.remove('placeholder'));
        label.addEventListener('blur', () => {
          const v = label.textContent;
          texts[labelKey] = v;
          if (!v.trim()) label.classList.add('placeholder');
          lsSet('texts', texts);
          syncText(labelKey, v);
        });
        row.appendChild(label);

        const cards = document.createElement('div');
        cards.className = 'progress-cards';
        PERIODS.forEach(p => {
          const v = Math.round(pct[p.key]);
          const card = document.createElement('div');
          card.className = 'progress-card';
          card.innerHTML = `<div class="progress-card-top"><span class="progress-card-label">${p.label}</span><span class="progress-card-pct">${v}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${v}%"></div></div>`;
          cards.appendChild(card);
        });
        row.appendChild(cards);
        wrap.appendChild(row);
      });
    }

    // ════════════════════════════════════════════════════════
    //  루틴 체크리스트
    // ════════════════════════════════════════════════════════

    // URL을 클릭 가능한 링크로 변환
    function linkify(text) {
      const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return safe.replace(/(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer" class="routine-link" onclick="event.stopPropagation()">$1</a>');
    }

    function renderRoutines() {
      CATS.forEach(cat => {
        const list = document.getElementById('list_' + cat.key);
        list.innerHTML = '';
        const items = routines.filter(r => r.category === cat.key)
                               .sort((a, b) => a.sort_order - b.sort_order);
        items.forEach((item, itemIdx) => {
          const row = document.createElement('div');
          row.className = 'routine-item';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.className = 'routine-checkbox';
          cb.checked = routineChecks.some(c => c.routine_id === item.id && c.check_date === todayStr());
          cb.addEventListener('change', () => toggleCheck(item.id, cb.checked));

          // 텍스트: 평소엔 링크 표시(읽기모드), 탭하면 편집모드로 전환
          const txt = document.createElement('div');
          txt.className = 'routine-text';
          txt.contentEditable = 'false';
          txt.spellcheck = false;
          if (item.label) {
            txt.innerHTML = linkify(item.label);
          } else {
            txt.classList.add('placeholder');
          }
          txt.addEventListener('click', e => {
            if (e.target.tagName === 'A') return; // 링크 클릭은 통과
            txt.classList.remove('placeholder');
            txt.contentEditable = 'true';
            txt.textContent = item.label || '';
            txt.focus();
            // 커서를 끝으로 이동
            const range = document.createRange();
            range.selectNodeContents(txt);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          });
          txt.addEventListener('blur', () => {
            const val = txt.textContent.trim();
            txt.contentEditable = 'false';
            if (!val) {
              txt.innerHTML = '';
              txt.classList.add('placeholder');
            } else {
              txt.innerHTML = linkify(val);
            }
            saveRoutineLabel(item, val);
          });

          // 순서 이동 버튼 ▲▼
          const moveWrap = document.createElement('div');
          moveWrap.className = 'routine-move-wrap';
          const up = document.createElement('button');
          up.className = 'routine-move';
          up.textContent = '▲';
          up.disabled = itemIdx === 0;
          up.onclick = () => moveRoutine(item.id, cat.key, -1);
          const dn = document.createElement('button');
          dn.className = 'routine-move';
          dn.textContent = '▼';
          dn.disabled = itemIdx === items.length - 1;
          dn.onclick = () => moveRoutine(item.id, cat.key, 1);
          moveWrap.appendChild(up);
          moveWrap.appendChild(dn);

          const del = document.createElement('button');
          del.className = 'routine-del';
          del.textContent = '✕';
          del.onclick = () => deleteRoutine(item.id, cat.key);

          row.appendChild(cb);
          row.appendChild(txt);
          row.appendChild(moveWrap);
          row.appendChild(del);
          list.appendChild(row);
        });

        // 항목 추가 버튼
        const addRow = document.createElement('div');
        addRow.className = 'add-item-row';
        const addBtn = document.createElement('button');
        addBtn.className = 'add-item-btn';
        addBtn.textContent = '＋ 항목추가';
        addBtn.onclick = () => addRoutine(cat.key);
        addRow.appendChild(addBtn);
        list.appendChild(addRow);
      });
    }

    async function moveRoutine(id, category, dir) {
      const items = routines.filter(r => r.category === category).sort((a, b) => a.sort_order - b.sort_order);
      const idx = items.findIndex(r => r.id === id);
      const newIdx = idx + dir;
      if (idx === -1 || newIdx < 0 || newIdx >= items.length) return;
      const a = items[idx], b = items[newIdx];
      [a.sort_order, b.sort_order] = [b.sort_order, a.sort_order];
      lsSet('routines', routines);
      renderRoutines();
      const toSave = [a, b].filter(r => isRemoteId(r.id));
      if (SUPA_READY && toSave.length) {
        setStatus('saving');
        try {
          await Promise.all(toSave.map(r => db.from('routines').update({ sort_order: r.sort_order }).eq('id', r.id)));
          setStatus('saved');
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
    }

    async function toggleCheck(routineId, isChecked) {
      const ts = todayStr();
      if (isChecked) {
        if (!routineChecks.some(c => c.routine_id === routineId && c.check_date === ts)) {
          routineChecks.push({ routine_id: routineId, check_date: ts });
        }
      } else {
        routineChecks = routineChecks.filter(c => !(c.routine_id === routineId && c.check_date === ts));
      }
      lsSet('checks', routineChecks);
      renderProgress();

      if (SUPA_READY && isRemoteId(routineId)) {
        setStatus('saving');
        try {
          if (isChecked) {
            const { error } = await db.from('routine_checks').insert({ routine_id: routineId, check_date: ts });
            setStatus(error ? 'error' : 'saved');
          } else {
            const { error } = await db.from('routine_checks').delete()
              .eq('routine_id', routineId).eq('check_date', ts);
            setStatus(error ? 'error' : 'saved');
          }
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
    }

    async function saveRoutineLabel(item, text) {
      item.label = text;
      lsSet('routines', routines);
      if (SUPA_READY && isRemoteId(item.id)) {
        setStatus('saving');
        try {
          const { error } = await db.from('routines').update({ label: text }).eq('id', item.id);
          setStatus(error ? 'error' : 'saved');
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
    }

    async function addRoutine(category) {
      const items = routines.filter(r => r.category === category);
      const order = items.length ? Math.max(...items.map(r => r.sort_order)) + 1 : 0;
      if (SUPA_READY) {
        setStatus('saving');
        try {
          const { data, error } = await db.from('routines')
            .insert({ category, label: '', sort_order: order }).select().single();
          if (error) throw error;
          routines.push(data);
          setStatus('saved');
        } catch (e) {
          console.error(e);
          routines.push({ id: uid(), category, label: '', sort_order: order });
          setStatus('error');
        }
      } else {
        routines.push({ id: uid(), category, label: '', sort_order: order });
        setStatus('local');
      }
      lsSet('routines', routines);
      renderRoutines();
      renderProgress();
    }

    async function deleteRoutine(id, category) {
      if (!confirm('이 항목을 삭제할까요?')) return;
      routines = routines.filter(r => r.id !== id);
      routineChecks = routineChecks.filter(c => c.routine_id !== id);
      lsSet('routines', routines);
      lsSet('checks', routineChecks);
      renderRoutines();
      renderProgress();

      if (SUPA_READY && isRemoteId(id)) {
        setStatus('saving');
        try {
          await db.from('routine_checks').delete().eq('routine_id', id);
          const { error } = await db.from('routines').delete().eq('id', id);
          setStatus(error ? 'error' : 'saved');
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
    }

      'title', 'today', 'week', 'year', 'routine',
      'label_today', 'label_week', 'label_year', 'label_routine',
      'title_progress', 'title_exercise', 'title_study', 'title_money', 'title_shortcuts', 'title_backup'
    ];
    const TEXT_DEFAULTS = {
      title: '내 스케줄 대시보드',
      label_today: '오늘할거',
      label_week: '이번주할거',
      label_year: '일년목표 증명해',
      label_routine: '루틴',
      title_progress: '26년 성장 진행률',
      title_exercise: '운동루틴',
      title_study: '공부루틴',

    function applyTexts() {
      TEXT_KEYS.forEach(key => {
        const el = document.getElementById('text_' + key);
        let val = texts[key];
        if (val === undefined) val = TEXT_DEFAULTS[key] !== undefined ? TEXT_DEFAULTS[key] : '';
        el.textContent = val;
        el.classList.toggle('placeholder', !val.trim());
      });

    function bindTexts() {
      TEXT_KEYS.forEach(key => {
        const el = document.getElementById('text_' + key);
        el.addEventListener('focus', () => el.classList.remove('placeholder'));
        el.addEventListener('blur', () => {
          const val = el.textContent;
          texts[key] = val;
          if (!val.trim()) el.classList.add('placeholder');
          lsSet('texts', texts);
          syncText(key, val);
        });

    async function syncText(key, val) {
      if (!SUPA_READY) { setStatus('local'); return; }
      setStatus('saving');
      try {
        const { error } = await db.from('dashboard_texts').upsert({ id: key, content: val });
        setStatus(error ? 'error' : 'saved');
      } catch (e) { console.error(e); setStatus('error'); }

    function defaultPages() {
      return [];
    }

    let pages = lsGet('pages', null) || defaultPages();
    let currentPageId = null;

    function makeMoveControls(p, idx) {
      const wrap = document.createElement('div');
      wrap.className = 'shortcut-controls';
      const up = document.createElement('button');
      up.className = 'shortcut-move';
      up.textContent = '▲';
      up.disabled = idx === 0;
      up.onclick = (e) => { e.stopPropagation(); moveShortcut(p.id, -1); };
      const down = document.createElement('button');
      down.className = 'shortcut-move';
      down.textContent = '▼';
      down.disabled = idx === pages.length - 1;
      down.onclick = (e) => { e.stopPropagation(); moveShortcut(p.id, 1); };
      wrap.appendChild(up);
      wrap.appendChild(down);
      return wrap;
    }

    function renderPages() {
      const wrap = document.getElementById('pageList');
      wrap.innerHTML = '';
      pages.forEach((p, idx) => {
        if (p.type === 'text') {
          const row = document.createElement('div');
          row.className = 'shortcut-text-item';

          const title = document.createElement('div');
          title.className = 'shortcut-text-title';
          title.contentEditable = 'true';
          title.spellcheck = false;
          title.textContent = p.title || '';
          title.classList.toggle('placeholder', !p.title);
          title.addEventListener('focus', () => title.classList.remove('placeholder'));
          title.addEventListener('blur', () => {
            const v = title.textContent.trim();
            title.classList.toggle('placeholder', !v);
            saveShortcutField(p, 'title', v);
          });

          const content = document.createElement('div');
          content.className = 'shortcut-text-content';
          content.contentEditable = 'true';
          content.spellcheck = false;
          content.textContent = p.content || '';
          content.classList.toggle('placeholder', !(p.content || '').trim());
          content.addEventListener('focus', () => content.classList.remove('placeholder'));
          content.addEventListener('blur', () => {
            const v = content.textContent;
            content.classList.toggle('placeholder', !v.trim());
            saveShortcutField(p, 'content', v);
          });

          const del = document.createElement('button');
          del.className = 'shortcut-del';
          del.textContent = '✕';
          del.onclick = () => deleteShortcut(p.id);

          row.appendChild(title);
          row.appendChild(content);
          row.appendChild(makeMoveControls(p, idx));
          row.appendChild(del);
          wrap.appendChild(row);
        } else {
          const row = document.createElement('div');
          row.className = 'page-list-item';
          const span = document.createElement('span');
          span.textContent = p.title || '(제목없음)';
          const right = document.createElement('span');
          right.style.display = 'flex';
          right.style.alignItems = 'center';
          right.style.gap = '6px';
          const del = document.createElement('button');
          del.className = 'shortcut-del';
          del.textContent = '✕';
          del.onclick = (e) => { e.stopPropagation(); deleteShortcut(p.id); };
          const arrow = document.createElement('span');
          arrow.className = 'page-arrow';
          arrow.textContent = '›';
          right.appendChild(makeMoveControls(p, idx));
          right.appendChild(del);
          right.appendChild(arrow);
          row.appendChild(span);
          row.appendChild(right);
          row.onclick = () => openPage(p.id);
          wrap.appendChild(row);
        }
      });
    }

    async function moveShortcut(id, dir) {
      const idx = pages.findIndex(x => x.id === id);
      const newIdx = idx + dir;
      if (idx === -1 || newIdx < 0 || newIdx >= pages.length) return;
      [pages[idx], pages[newIdx]] = [pages[newIdx], pages[idx]];
      pages.forEach((p, i) => { p.sort_order = i; });
      lsSet('pages', pages);
      renderPages();
      const moved = [pages[idx], pages[newIdx]].filter(p => isRemoteId(p.id));
      if (SUPA_READY && moved.length) {
        setStatus('saving');
        try {
          await Promise.all(moved.map(p => db.from('pages').update({ sort_order: p.sort_order }).eq('id', p.id)));
          setStatus('saved');
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
    }

    async function saveShortcutField(item, field, val) {
      item[field] = val;
      lsSet('pages', pages);
      if (SUPA_READY && isRemoteId(item.id)) {
        setStatus('saving');
        try {
          const { error } = await db.from('pages').update({ [field]: val }).eq('id', item.id);
          setStatus(error ? 'error' : 'saved');

      } else {

      }
    }

    async function deleteCurrentPage() {
      if (currentPageId == null) return;
      if (!confirm('이 페이지를 삭제할까요? 페이지 안의 이미지도 함께 삭제됩니다.')) return;
      const p = pages.find(x => x.id === currentPageId);

      if (SUPA_READY && isRemoteId(currentPageId)) {
        setStatus('saving');
        try {
          // 페이지 내 이미지 삭제
          const tmp = document.createElement('div');
          tmp.innerHTML = p?.content || '';
          const imgs = [...tmp.querySelectorAll('img')];
          await Promise.all(imgs.map(img => deleteStorageImg(img.src)));

          const { error } = await db.from('pages').delete().eq('id', currentPageId);
          if (error) throw error;
          setStatus('saved');
        } catch (e) { console.error(e); setStatus('error'); }
      } else {
        setStatus(SUPA_READY ? 'saved' : 'local');
      }
      pages = pages.filter(x => x.id !== currentPageId);
      lsSet('pages', pages);
      closePage();
      renderPages();
    }

    document.getElementById('pageViewTitle').addEventListener('blur', savePageTitle);
    document.getElementById('pageContent').addEventListener('blur', savePageContent);

    // ── 이미지 업로드 / 삭제 (Supabase Storage: dashboard_images 버킷, 미설정 시 base64로 대체) ──
    function compressToBlob(blob) {
      return new Promise(resolve => {
        const url = URL.createObjectURL(blob);
        const tmp = new Image();
        tmp.onload = () => {
          const MAX = 1200;
          let w = tmp.width, h = tmp.height;
          if (w > MAX || h > MAX) {
            if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
            else        { w = Math.round(w * MAX / h); h = MAX; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(tmp, 0, 0, w, h);
          URL.revokeObjectURL(url);
          c.toBlob(b => resolve(b), 'image/jpeg', 0.85);
        };
        tmp.src = url;
      });
    }

    function blobToDataUrl(blob) {
      return new Promise(resolve => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(blob);
      });
    }

    async function uploadImage(blob) {
      const compressed = await compressToBlob(blob);
      if (SUPA_READY) {
        try {
          const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
          const { data, error } = await db.storage.from('dashboard_images')
            .upload(fileName, compressed, { contentType: 'image/jpeg' });
          if (error) throw error;
          return db.storage.from('dashboard_images').getPublicUrl(data.path).data.publicUrl;
        } catch (e) {
          console.warn('Storage 업로드 실패, 이 기기에만 저장합니다:', e);
        }
      }
      return blobToDataUrl(compressed);
    }

    async function deleteStorageImg(src) {
      if (!src || !src.includes('/dashboard_images/')) return;
      try {
        const path = src.split('/dashboard_images/')[1].split('?')[0];
        await db.storage.from('dashboard_images').remove([path]);
      } catch (e) { console.warn('이미지 삭제 실패:', e); }
    }

    // 페이지 본문에 이미지 붙여넣기
    document.getElementById('pageContent').addEventListener('paste', async e => {
      const imgItem = [...(e.clipboardData?.items || [])].find(it => it.type.startsWith('image/'));
      if (!imgItem) return;
      e.preventDefault();
      setStatus('saving');
      try {
        const url = await uploadImage(imgItem.getAsFile());
        const img = document.createElement('img');
        img.src = url;
        registerPageImg(img);
        insertAtCursor(img);
        await savePageContent();
      } catch (err) { console.error(err); setStatus('error'); }
    });

    function insertAtCursor(node) {
      const area = document.getElementById('pageContent');
      const sel = window.getSelection();
      if (sel?.rangeCount && area.contains(sel.getRangeAt(0).startContainer)) {
        const r = sel.getRangeAt(0);
        r.deleteContents();
        const after = document.createTextNode('​');
        r.insertNode(after);
        r.insertNode(node);
        r.setStartAfter(after);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);
      } else {
        area.appendChild(node);
      }
    }

    // ── 이미지 툴바 (크게보기 / 크기조절 / 삭제) + 드래그 리사이즈 ──
    let _imgToolbar = null, _imgHandle = null, _imgSel = null;

    function closeImgUI() {
      _imgToolbar?.remove(); _imgToolbar = null;
      _imgHandle?.remove();  _imgHandle  = null;
      if (_imgSel) { _imgSel.classList.remove('img-selected'); _imgSel = null; }
    }

    function placeImgUI(img) {
      const r = img.getBoundingClientRect();
      if (_imgToolbar) {
        const bh = _imgToolbar.offsetHeight || 32, bw = _imgToolbar.offsetWidth || 180;
        let top  = r.top - bh - 6; if (top < 4) top = r.bottom + 4;
        let left = r.left;         if (left + bw > innerWidth - 4) left = innerWidth - bw - 4;
        _imgToolbar.style.top  = top  + 'px';
        _imgToolbar.style.left = left + 'px';
      }
      if (_imgHandle) {
        _imgHandle.style.top  = (r.bottom - 7) + 'px';
        _imgHandle.style.left = (r.right  - 7) + 'px';
      }
    }

    function openImgUI(img, onDelete) {
      closeImgUI();
      _imgSel = img;
      img.classList.add('img-selected');

      const bar = document.createElement('div');
      bar.className = 'img-toolbar';
      _imgToolbar = bar;

      const viewBtn = document.createElement('button');
      viewBtn.textContent = '🔍 크게 보기';
      viewBtn.onmousedown = e => e.preventDefault();
      const openLightbox = e => {
        e.stopPropagation(); e.preventDefault();
        document.getElementById('lightboxImg').src = img.src;
        document.getElementById('lightbox').classList.add('on');
        closeImgUI();
      };
      viewBtn.onclick = openLightbox;
      viewBtn.addEventListener('touchend', openLightbox);
      bar.appendChild(viewBtn);

      const sep0 = document.createElement('span');
      sep0.style.cssText = 'width:1px;background:#444;margin:2px 4px;align-self:stretch;display:inline-block;';
      sep0.className = 'img-size-btn';
      bar.appendChild(sep0);

      const mkSizeBtn = (label, delta) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.className = 'img-size-btn';
        btn.style.cssText = 'font-size:16px;padding:2px 8px;';
        btn.onmousedown = e => e.preventDefault();
        const doResize = e => {
          e.stopPropagation(); e.preventDefault();
          const cur = img.offsetWidth || 200;
          img.style.width = Math.max(40, cur + delta) + 'px';
          img.style.height = 'auto';
          savePageContent();
        };
        btn.onclick = doResize;
        btn.addEventListener('touchend', doResize);
        bar.appendChild(btn);
      };
      mkSizeBtn('−', -30);
      mkSizeBtn('＋', 30);

      if (onDelete) {
        const sep = document.createElement('span');
        sep.style.cssText = 'width:1px;background:#444;margin:2px 4px;align-self:stretch;display:inline-block;';
        bar.appendChild(sep);
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.className = 'del';
        delBtn.onmousedown = e => e.preventDefault();
        const doDelete = e => { e.stopPropagation(); e.preventDefault(); closeImgUI(); onDelete(img); };
        delBtn.onclick = doDelete;
        delBtn.addEventListener('touchend', doDelete);
        bar.appendChild(delBtn);
      }
      document.body.appendChild(bar);

      const handle = document.createElement('div');
      handle.className = 'img-resize-handle';
      _imgHandle = handle;
      document.body.appendChild(handle);
      requestAnimationFrame(() => placeImgUI(img));

      handle.addEventListener('mousedown', ev => {
        ev.preventDefault(); ev.stopPropagation();
        const startX = ev.clientX, startW = img.offsetWidth || 200;
        document.body.style.cursor = 'nwse-resize';
        document.body.style.userSelect = 'none';
        const onMove = mv => {
          img.style.width = Math.max(40, startW + mv.clientX - startX) + 'px';
          img.style.height = 'auto';
          requestAnimationFrame(() => placeImgUI(img));
        };
        const onUp = () => {
          document.body.style.cursor = document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          savePageContent();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      handle.addEventListener('touchstart', ev => {
        ev.preventDefault(); ev.stopPropagation();
        const t0 = ev.touches[0];
        const startX = t0.clientX, startW = img.offsetWidth || 200;
        const onMove = mv => {
          const t = mv.touches[0];
          img.style.width = Math.max(40, startW + t.clientX - startX) + 'px';
          img.style.height = 'auto';
          requestAnimationFrame(() => placeImgUI(img));
        };
        const onUp = () => {
          document.removeEventListener('touchmove', onMove);
          document.removeEventListener('touchend', onUp);
          savePageContent();
        };
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onUp);
      }, { passive: false });
    }

    function registerPageImg(img) {
      const onDelete = (im) => {
        deleteStorageImg(im.src);
        im.remove();
        savePageContent();
      };
      img.addEventListener('click', e => { e.stopPropagation(); openImgUI(img, onDelete); });
      img.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); openImgUI(img, onDelete); });
    }

    document.addEventListener('click', closeImgUI);

    function reattachPageImgs() {
      document.getElementById('pageContent').querySelectorAll('img').forEach(registerPageImg);
    }

    // ════════════════════════════════════════════════════════
    //  초기화 — localStorage(또는 기본값)로 즉시 렌더링 후,
    //  Supabase가 설정돼 있으면 서버 데이터로 동기화
    // ════════════════════════════════════════════════════════
    async function loadFromSupabase() {
      if (!SUPA_READY) { setStatus('local'); return; }
      setStatus('saving');
      try {
        const yearPrefix = todayStr().slice(0, 4);
        const [r, c, t, p] = await Promise.all([
          db.from('routines').select('*').order('sort_order'),
          db.from('routine_checks').select('routine_id, check_date').gte('check_date', yearPrefix + '-01-01'),
          db.from('dashboard_texts').select('*'),
          db.from('pages').select('*').order('sort_order'),
        ]);
        if (r.error) throw r.error;
        if (c.error) throw c.error;
        if (t.error) throw t.error;
        if (p.error) throw p.error;

        if (r.data && r.data.length) { routines = r.data; lsSet('routines', routines); }
        routineChecks = c.data || []; lsSet('checks', routineChecks);
        const map = {};
        (t.data || []).forEach(row => map[row.id] = row.content);
        TEXT_KEYS.forEach(k => { if (map[k] !== undefined) texts[k] = map[k]; });
        CAT_LABEL_KEYS.forEach(k => { if (map[k] !== undefined) texts[k] = map[k]; });
        lsSet('texts', texts);
        if (p.data && p.data.length) { pages = p.data; lsSet('pages', pages); }

        renderProgress();
        renderRoutines();
        applyTexts();
        renderPages();
        setStatus('saved');
      } catch (e) {
        console.error('Supabase 로드 실패:', e);
        setStatus('error');
      }
    }

    function renderHeaderDate() {
      const days = ['일','월','화','수','목','금','토'];
      const d = new Date();
      const el = document.getElementById('headerDate');
      if (el) el.textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    // ════════════════════════════════════════════════════════
    //  데이터 백업 / 복원
    //  - 오늘/이번달/연간 진행률은 routineChecks(날짜별 기록)을
    //    기준으로 매번 계산되므로, 데이터 자체는 백엔드(Supabase)와
    //    백업 파일에 영구 누적되고, 화면의 "오늘" 수치만 날짜가
    //    바뀌면 자동으로 0%부터 다시 계산됩니다.
    // ════════════════════════════════════════════════════════
    function backupData() {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        texts: lsGet('texts', {}),
        routines: lsGet('routines', []),
        checks: lsGet('checks', []),
        pages: lsGet('pages', []),
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `schedule_backup_${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function syncAllToSupabase() {
      // dashboard_texts: 전체 upsert
      const textRows = Object.keys(texts).map(k => ({ id: k, content: texts[k] }));
      if (textRows.length) await db.from('dashboard_texts').upsert(textRows);

      // pages: 전체 교체
      await db.from('pages').delete().gte('id', 0);
      if (pages.length) {
        const insertPages = pages.map(({ id, ...rest }) => rest);
        const { data, error } = await db.from('pages').insert(insertPages).select();
        if (!error && data) { pages = data; lsSet('pages', pages); }
      }

      // routines + routine_checks: 전체 교체 (id 매핑)
      await db.from('routine_checks').delete().gte('routine_id', 0);
      await db.from('routines').delete().gte('id', 0);
      const idMap = {};
      if (routines.length) {
        const insertRoutines = routines.map(({ id, ...rest }) => rest);
        const { data, error } = await db.from('routines').insert(insertRoutines).select();
        if (!error && data) {
          routines.forEach((old, i) => { idMap[old.id] = data[i].id; });
          routines = data;
          lsSet('routines', routines);
        }
      }
      if (routineChecks.length) {
        const insertChecks = routineChecks
          .map(c => ({ routine_id: idMap[c.routine_id] !== undefined ? idMap[c.routine_id] : c.routine_id, check_date: c.check_date }))
          .filter(c => typeof c.routine_id === 'number');
        if (insertChecks.length) await db.from('routine_checks').insert(insertChecks);
      }
    }

    async function restoreData(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (!confirm('백업 파일을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?')) {
        event.target.value = '';
        return;
      }
      try {
        const text = await file.text();
        const data = JSON.parse(text);

        if (data.texts) { texts = data.texts; lsSet('texts', texts); }
        if (data.routines) { routines = data.routines; lsSet('routines', routines); }
        if (data.checks) { routineChecks = data.checks; lsSet('checks', routineChecks); }
        if (data.pages) { pages = data.pages; lsSet('pages', pages); }

        renderProgress();
        renderRoutines();
        applyTexts();
        renderPages();

        if (SUPA_READY) {
          setStatus('saving');
          await syncAllToSupabase();
          setStatus('saved');
        } else {
          setStatus('local');
        }
        alert('복원이 완료되었습니다.');
      } catch (e) {
        console.error('복원 실패:', e);
        alert('백업 파일을 읽을 수 없습니다.');
      } finally {
        event.target.value = '';
      }
    }

    // ════════════════════════════════════════════════════════
    //  날짜가 바뀌면 "오늘" 체크박스 / 진행률 자동 새로고침
    //  (페이지를 새로고침하지 않고 자정을 넘긴 경우 대응)
    // ════════════════════════════════════════════════════════
    let __lastDateStr = todayStr();
    setInterval(() => {
      const now = todayStr();
      if (now !== __lastDateStr) {
        __lastDateStr = now;
        renderHeaderDate();
        renderProgress();
        renderRoutines();
      }
    }, 60 * 1000);

    function init() {
      // Supabase 연결 여부와 상관없이 먼저 화면을 그린다
      renderHeaderDate();
      renderProgress();
      renderRoutines();
      applyTexts();
      bindTexts();
      renderPages();
      loadFromSupabase();
    }
    // ─────────────────────────────────────────────────────────
    // 링크 탭 처리: iOS Safari에서 contenteditable 내부 <a> 링크가
    // 클릭되지 않는 문제를 pointerdown 캡처 페이즈로 해결
    // ─────────────────────────────────────────────────────────
    document.addEventListener('pointerdown', function(e) {
      const a = e.target.closest('a[href]');
      if (!a) return;
      e.preventDefault();
      e.stopPropagation();
      const url = a.href;
      const w = window.open(url, '_blank', 'noopener,noreferrer');
      if (!w) { location.href = url; }
    }, true);

    init();
  </script>
</body>
